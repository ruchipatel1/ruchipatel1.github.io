name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  repository_dispatch:
    types: [resume-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull resume PDF into public/ (optional)
        if: ${{ vars.RESUME_PDF_FETCH_URL != '' }}
        run: |
          mkdir -p public
          curl -fsSL "${{ vars.RESUME_PDF_FETCH_URL }}" -o public/RuchiPatelResume.pdf
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_FORMSPREE_FORM_ID: ${{ vars.VITE_FORMSPREE_FORM_ID }}
          VITE_RESUME_PDF_URL: ${{ vars.VITE_RESUME_PDF_URL }}
          VITE_RESUME_PREVIEW_IMAGE_URL: ${{ vars.VITE_RESUME_PREVIEW_IMAGE_URL }}
          VITE_RESUME_SOURCE_REPO_URL: ${{ vars.VITE_RESUME_SOURCE_REPO_URL }}
      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
